<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر المخطوطات الذكي</title>
    <style>
        body { font-family: 'Amiri', serif; background: #fcfbf7; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; max-width: 1200px; display: flex; gap: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .img-box { position: relative; overflow: hidden; border: 2px solid #5d4037; height: 500px; cursor: zoom-in; display: flex; align-items: center; justify-content: center; background: #eee; }
        #displayImg { width: 100%; transition: transform 0.1s; transform-origin: center; }
        textarea { width: 100%; height: 300px; font-size: 1.5rem; padding: 15px; border: 2px solid #d7ccc8; border-radius: 8px; resize: none; box-sizing: border-box; font-family: 'Amiri'; }
        button { background: #5d4037; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 5px; width: 100%; font-family: 'Amiri'; font-size: 1.2rem; margin-top: 10px; }
        #loader { font-size: 1.5rem; margin: 50px; color: #8d6e63; }
        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loader">جاري جلب بيانات الاختبار... ⏳</div>

    <div id="mainContent" class="hidden">
        <h2 style="color: #5d4037;">مختبر قراءة المخطوطات</h2>
        <div style="margin-bottom: 15px;">
            <input type="text" id="sName" placeholder="اسم الطالب" style="padding: 10px; width: 200px;">
            <input type="text" id="sID" placeholder="الرقم الجامعي" style="padding: 10px; width: 200px;">
        </div>

        <div class="container">
            <div class="card">
                <div class="img-box" id="zoomArea">
                    <img id="displayImg" src="">
                </div>
            </div>
            <div class="card">
                <textarea id="studentInput" placeholder="انسخ النص هنا..."></textarea>
                <div id="feedback" style="margin-top:10px; font-weight:bold;"></div>
                <button onclick="finish()">إنهاء وإرسال النتيجة</button>
            </div>
        </div>
    </div>

    <script>
        // --- ضع رابط الـ Apps Script الخاص بك هنا ---
        const apiURL = "ضع_رابط_APPS_SCRIPT_هنا";
        let correctText = "";

        // جلب البيانات عند الفتح
        window.onload = async function() {
            try {
                const res = await fetch(apiURL);
                const config = await res.json();
                document.getElementById('displayImg').src = config.image;
                correctText = config.text;
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                setupZoom();
            } catch (e) { document.getElementById('loader').innerText = "خطأ في الاتصال بالجدول! ❌"; }
        };

        // التنبيه الفوري
        document.getElementById('studentInput').oninput = function() {
            const val = this.value.trim().replace(/\s+/g, ' ');
            const target = correctText.trim().replace(/\s+/g, ' ');
            document.getElementById('feedback').innerHTML = target.startsWith(val) ? 
                '<span style="color:green">صحيح ✅</span>' : '<span style="color:red">خطأ ❌</span>';
        };

        function setupZoom() {
            const img = document.getElementById('displayImg');
            const box = document.getElementById('zoomArea');
            box.onmousemove = (e) => {
                const r = box.getBoundingClientRect();
                img.style.transformOrigin = `${((e.clientX - r.left)/r.width)*100}% ${((e.clientY - r.top)/r.height)*100}%`;
                img.style.transform = "scale(2.5)";
            };
            box.onmouseleave = () => img.style.transform = "scale(1)";
        }

        async function finish() {
            const name = document.getElementById('sName').value;
            const id = document.getElementById('sID').value;
            if(!name || !id) return alert("أدخل بياناتك!");

            const userWords = document.getElementById('studentInput').value.trim().split(/\s+/);
            const correctWords = correctText.trim().split(/\s+/);
            let score = 0;
            correctWords.forEach((w, i) => { if(w === userWords[i]) score++; });
            const finalScore = ((score/correctWords.length)*100).toFixed(1) + "%";

            // إرسال للجدول
            await fetch(apiURL, { method: 'POST', body: JSON.stringify({name, id, score: finalScore}) });
            alert("تم إرسال نتيجتك بنجاح: " + finalScore);
            location.reload();
        }
    </script>
</body>
</html>
