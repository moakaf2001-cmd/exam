<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر المخطوطات </title>
    <style>
        body { font-family: 'Amiri', serif; background-color: #fcfbf7; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-wrapper { display: flex; width: 95%; max-width: 1200px; gap: 20px; }
        .section { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        /* إطار الصورة */
        .img-container { position: relative; overflow: hidden; border: 2px solid #5d4037; height: 500px; background: #fff; cursor: zoom-in; display: flex; align-items: center; justify-content: center; }
        #displayImg { width: 100%; transition: transform 0.1s; transform-origin: center; }
        textarea { width: 100%; height: 250px; font-size: 1.5rem; padding: 15px; border: 2px solid #d7ccc8; border-radius: 8px; resize: none; box-sizing: border-box; font-family: 'Amiri', serif; }
        .result-box { background: #fdfae3; padding: 20px; border-radius: 12px; margin-top: 20px; display: none; width: 100%; text-align: right; }
        button { background: #5d4037; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; font-family: 'Amiri'; font-size: 1.2rem; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

    <h2 style="color: #5d4037;">مختبر قراءة المخطوطات العربيّة</h2>
    
    <div style="display:flex; gap:10px; margin-bottom:15px; width:95%;">
        <input type="text" id="studentName" placeholder="اسم الطالب" style="flex:1; padding:10px;">
        <input type="text" id="studentID" placeholder="الرقم الجامعي" style="flex:1; padding:10px;">
    </div>

    <div class="main-wrapper">
        <div class="section">
            <div class="img-container" id="zoom-area">
                <img id="displayImg" src="https://storage.googleapis.com/gweb-unison-publish.appspot.com/files/image.jpg">
            </div>
        </div>
        <div class="section">
            <textarea id="studentInput" placeholder="ابدأ بالنسخ هنا..."></textarea>
            <div id="liveFeedback" style="margin-top:10px; font-weight:bold;"></div>
            <button onclick="showResults()">إنهاء الاختبار وعرض النتيجة</button>
            <div id="resultBox" class="result-box">
                <p id="accuracyPercent" style="font-size:1.5rem; font-weight:bold;"></p>
                <div id="comparisonArea" style="line-height:2.5rem;"></div>
            </div>
        </div>
    </div>

    <script>
        const correctText = "بسم الله الرحمن الرحيم رب يسر يا كريم الحمد لله الذي فضل بني آدم بالعلم والعمل على جميع العالم والصلاة والسلام على محمد سيد العرب والعجم وعلى آله وأصحابه ينابيع العلوم والحكم وبعد فلما رأيت كثيرا من طلاب العلم في زماننا يجدون إلى العلم ولا يصلون ومن منافعه وثمراته وهي العمل به والنشر يحرمون لما أنهم أخطأوا طريقه وتركوا شرائطه وكل من أخطأ الطريق ضل ولا ينال المقصود قل أو جل فأردت وأحببت أن أبين لهم طريق التعلم على ما رأيت في الكتب وسمعت من أساتيذي أولي العلم والحكم رجاء للدعاء لي من الراغبين فيه المخلصين بالفوز والخلاص في يوم الدين بعدما استخرت الله تعالى فيه وسميته كتاب تعليم المتعلم طريق التعلم وجعلته فصولا";

        // التنبيه الفوري
        document.getElementById('studentInput').addEventListener('input', function() {
            const feedback = document.getElementById('liveFeedback');
            const val = this.value.trim().replace(/\s+/g, ' ');
            const target = correctText.trim().replace(/\s+/g, ' ');
            if (target.startsWith(val)) {
                feedback.innerHTML = '<span style="color:green">صحيح.. ✅</span>';
            } else {
                feedback.innerHTML = '<span style="color:red">خطأ! ❌</span>';
            }
        });

        // التكبير
        const img = document.getElementById('displayImg');
        const zoomArea = document.getElementById('zoom-area');
        zoomArea.onmousemove = (e) => {
            const rect = zoomArea.getBoundingClientRect();
            img.style.transformOrigin = `${((e.clientX - rect.left) / rect.width) * 100}% ${((e.clientY - rect.top) / rect.height) * 100}%`;
            img.style.transform = "scale(2.5)";
        };
        zoomArea.onmouseleave = () => img.style.transform = "scale(1)";

        function showResults() {
            const userText = document.getElementById('studentInput').value;
            const origWords = correctText.trim().split(/\s+/);
            const userWords = userText.trim().split(/\s+/);
            let correct = 0;
            let html = '';

            origWords.forEach((word, i) => {
                if (word === userWords[i]) {
                    html += `<span style="color:green">${word}</span> `;
                    correct++;
                } else {
                    html += `<span style="color:red">${userWords[i] || "___"}</span> <span style="color:brown; background:#eee;">[${word}]</span> `;
                }
            });

            document.getElementById('accuracyPercent').innerText = "الدرجة: " + ((correct / origWords.length) * 100).toFixed(1) + "%";
            document.getElementById('comparisonArea').innerHTML = html;
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>
</html>
