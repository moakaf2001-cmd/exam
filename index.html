<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار المخطوطات - نسخة مستقرة</title>
    <style>
        body { font-family: 'Amiri', serif; background-color: #fcfbf7; padding: 20px; text-align: center; color: #3e2723; }
        .main-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); flex: 1; min-width: 400px; }
        .img-box { position: relative; overflow: hidden; border: 2px solid #5d4037; height: 500px; background: #eee; cursor: zoom-in; }
        #displayImg { width: 100%; transition: transform 0.1s; transform-origin: center; }
        textarea { width: 100%; height: 300px; font-size: 1.5rem; padding: 15px; border: 2px solid #d7ccc8; border-radius: 8px; font-family: 'Amiri'; box-sizing: border-box; }
        #liveFeedback { font-weight: bold; margin: 15px 0; min-height: 1.5rem; }
        .success { color: green; } .error { color: red; }
        button { background: #5d4037; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 1.2rem; width: 100%; }
        .results { display: none; background: #fdfae3; padding: 20px; margin-top: 20px; text-align: right; border-radius: 10px; }
        .word-original { color: brown; font-weight: bold; background: #fff9c4; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

    <h1>اختبار قراءة المخطوط</h1>
    
    <div style="margin-bottom: 20px;">
        <input type="text" id="studentName" placeholder="الاسم" style="padding: 10px; width: 200px;">
        <input type="text" id="studentID" placeholder="الرقم" style="padding: 10px; width: 200px;">
    </div>

    <div class="main-container">
        <div class="box">
            <div class="img-box" id="zoomArea">
                <img id="displayImg" src="image.png" onerror="this.style.display='none'; document.getElementById('imgError').style.display='block';">
                <div id="imgError" style="display:none; padding: 50px; color: red;">
                    ⚠️ خطأ: لم يتم العثور على الصورة!<br>
                    تأكد أن ملف الصورة في GitHub اسمه <b>image.jpg</b> تماماً.
                </div>
            </div>
        </div>

        <div class="box">
            <textarea id="studentInput" placeholder="ابدأ النسخ هنا..."></textarea>
            <div id="liveFeedback"></div>
            <button onclick="checkFinal()">إنهاء الاختبار</button>

            <div id="results" class="results" id="resultsArea">
                <h3>النتيجة: <span id="percent"></span></h3>
                <div id="comparison" style="line-height: 2.5rem;"></div>
                <button onclick="location.reload()" style="background: #8d6e63; margin-top: 10px;">إعادة</button>
            </div>
        </div>
    </div>

    <script>
        // النص الذي استخرجته لك من صورتك
        const correctText = "بسم الله الرحمن الرحيم رب يسر يا كريم الحمد لله الذي فضل بني آدم بالعلم والعمل على جميع العالم والصلاة والسلام على محمد سيد العرب والعجم وعلى آله وأصحابه ينابيع العلوم والحكم وبعد فلما رأيت كثيرا من طلاب العلم في زماننا يجدون إلى العلم ولا يصلون ومن منافعه وثمراته وهي العمل به والنشر يحرمون لما أنهم أخطأوا طريقه وتركوا شرائطه وكل من أخطأ الطريق ضل ولا ينال المقصود قل أو جل فأردت وأحببت أن أبين لهم طريق التعلم على ما رأيت في الكتب وسمعت من أساتيذي أولي العلم والحكم رجاء للدعاء لي من الراغبين فيه المخلصين بالفوز والخلاص في يوم الدين بعدما استخرت الله تعالى فيه وسميته كتاب تعليم المتعلم طريق التعلم وجعلته فصولا";

        const scriptURL = "ضع_رابط_جوجل_هنا";

        // التنبيه الفوري أثناء الكتابة
        document.getElementById('studentInput').addEventListener('input', function() {
            const feedback = document.getElementById('liveFeedback');
            const currentText = this.value.trim().replace(/\s+/g, ' ');
            const normalizedCorrect = correctText.trim().replace(/\s+/g, ' ');

            if (normalizedCorrect.startsWith(currentText)) {
                feedback.innerHTML = '<span class="success">ممتاز، تابع الكتابة.. ✅</span>';
            } else {
                feedback.innerHTML = '<span class="error">خطأ في الكلمة الأخيرة! ❌</span>';
            }
        });

        // التكبير
        const img = document.getElementById('displayImg');
        const zoomArea = document.getElementById('zoomArea');
        zoomArea.onmousemove = (e) => {
            const rect = zoomArea.getBoundingClientRect();
            img.style.transformOrigin = `${((e.clientX - rect.left) / rect.width) * 100}% ${((e.clientY - rect.top) / rect.height) * 100}%`;
            img.style.transform = "scale(2.5)";
        };
        zoomArea.onmouseleave = () => img.style.transform = "scale(1)";

        // النتيجة النهائية
        function checkFinal() {
            const name = document.getElementById('studentName').value;
            const id = document.getElementById('studentID').value;
            if(!name || !id) return alert("أدخل بياناتك!");

            const userWords = document.getElementById('studentInput').value.trim().split(/\s+/);
            const correctWords = correctText.trim().split(/\s+/);
            let score = 0;
            let html = "";

            correctWords.forEach((word, i) => {
                if (word === userWords[i]) {
                    score++;
                    html += `<span style="color:green">${word}</span> `;
                } else {
                    html += `<span style="color:red">${userWords[i] || "___"}</span> <span class="word-original">[${word}]</span> `;
                }
            });

            const finalScore = ((score / correctWords.length) * 100).toFixed(1) + "%";
            document.getElementById('percent').innerText = finalScore;
            document.getElementById('comparison').innerHTML = html;
            document.getElementById('results').style.display = 'block';

            // إرسال لجوجل
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name, id, score: finalScore}) });
        }
    </script>
</body>
</html>
