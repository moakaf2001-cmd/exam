<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر المخطوطات - الأستاذ هاشم</title>
    <style>
        body { font-family: 'Amiri', serif; background-color: #fcfbf7; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #3e2723; margin: 0; }
        h2 { color: #5d4037; margin-bottom: 10px; }
        
        /* بيانات الطالب */
        .student-info { display: flex; gap: 15px; margin-bottom: 20px; background: #efebe9; padding: 15px; border-radius: 10px; width: 95%; max-width: 1200px; box-sizing: border-box; border: 1px solid #d7ccc8; }
        .student-info input { flex: 1; padding: 12px; border: 1px solid #d7ccc8; border-radius: 6px; font-size: 1.1rem; font-family: 'Amiri'; }

        /* واجهة الاختبار */
        .main-wrapper { display: flex; width: 95%; max-width: 1200px; gap: 25px; align-items: flex-start; }
        .section { flex: 1; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* إطار الصورة والتكبير - تم تعديله لحل مشكلة السواد */
        .img-container { 
            position: relative; 
            overflow: hidden; 
            border: 2px solid #5d4037; 
            border-radius: 8px; 
            cursor: zoom-in; 
            background-color: #eee; /* لون خلفية فاتح بدلاً من الأسود */
            height: 500px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        #displayImg { 
            max-width: 100%; 
            max-height: 100%; 
            display: block; 
            transition: transform 0.1s ease-out; 
            transform-origin: center center; 
        }

        /* منطقة الكتابة */
        textarea#studentInput { 
            width: 100%; 
            height: 300px; 
            font-size: 1.5rem; 
            line-height: 2.3rem; 
            padding: 15px; 
            border: 2px solid #d7ccc8; 
            border-radius: 8px; 
            resize: none; 
            box-sizing: border-box; 
            font-family: 'Amiri', serif; 
            background: #fffdf9;
        }
        textarea#studentInput:focus { outline: none; border-color: #a1887f; }

        /* التنبيه الفوري */
        #liveFeedback { font-weight: bold; font-size: 1.2rem; text-align: center; margin-top: 15px; min-height: 2rem; }
        .success-text { color: #2e7d32; } 
        .error-text { color: #c62828; }

        button { background-color: #5d4037; color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-size: 1.2rem; font-family: 'Amiri'; margin-top: 15px; width: 100%; transition: 0.3s; }
        button:hover { background-color: #3e2723; }
        
        /* منطقة النتائج */
        .result-box { background: #fdfae3; border: 2px solid #fff9c4; padding: 25px; border-radius: 12px; margin-top: 25px; text-align: right; width: 100%; box-sizing: border-box; display: none; }
        .comparison { margin-top: 20px; font-size: 1.3rem; line-height: 2.6rem; border-top: 1px solid #d7ccc8; padding-top: 15px; }
        .word-correct { color: #2e7d32; font-weight: bold; }
        .word-wrong { color: #c62828; text-decoration: line-through; }
        .word-original { color: #5d4037; font-weight: bold; background: #fff9c4; padding: 0 4px; border-radius: 3px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

    <h2>مختبر قراءة المخطوطات العربيّة</h2>
    <p style="margin-bottom: 20px; color: #8d6e63;">الهدف: النسخ الحرفي الدقيق للنص الظاهر في الصورة.</p>
    
    <div class="student-info">
        <input type="text" id="studentName" placeholder="اسم الطالب بالكامل">
        <input type="text" id="studentID" placeholder="الرقم الجامعي">
    </div>

    <div class="main-wrapper">
        <div class="section" style="flex: 1.3;">
            <div class="img-container" id="img-zoom-container">
                <img id="displayImg" src="image.jpg" alt="المخطوط">
            </div>
            <p style="text-align: center; color: #8d6e63; font-size: 0.9rem; margin-top: 10px;">* حرك الفأرة فوق الصورة للتكبير التفاعلي.</p>
        </div>
        
        <div class="section">
            <textarea id="studentInput" placeholder="ابدأ بالنسخ الحرفي هنا..."></textarea>
            <div id="liveFeedback"></div>
            <button id="finishBtn" onclick="showResults()">إنهاء الاختبار وعرض النتيجة</button>

            <div class="result-box" id="resultBox">
                <h3>النتيجة والتصحيح النهائي:</h3>
                <div id="studentDataDisplay" style="margin-bottom: 10px; font-size: 1.2rem;"></div>
                <p style="font-size: 1.5rem; font-weight: bold;">نسبة الإتقان: <span id="accuracyPercent"></span></p>
                <div id="comparisonArea" class="comparison"></div>
                <button onclick="location.reload()" style="background:#8d6e63; width: auto; margin-top: 15px;">إعادة الاختبار</button>
            </div>
        </div>
    </div>

    <script>
        // النص النموذجي المستخرج من الصورة
        const correctText = "بسم الله الرحمن الرحيم رب يسر يا كريم الحمد لله الذي فضل بني آدم بالعلم والعمل على جميع العالم والصلاة والسلام على محمد سيد العرب والعجم وعلى آله وأصحابه ينابيع العلوم والحكم وبعد فلما رأيت كثيرا من طلاب العلم في زماننا يجدون إلى العلم ولا يصلون ومن منافعه وثمراته وهي العمل به والنشر يحرمون لما أنهم أخطأوا طريقه وتركوا شرائطه وكل من أخطأ الطريق ضل ولا ينال المقصود قل أو جل فأردت وأحببت أن أبين لهم طريق التعلم على ما رأيت في الكتب وسمعت من أساتيذي أولي العلم والحكم رجاء للدعاء لي من الراغبين فيه المخلصين بالفوز والخلاص في يوم الدين بعدما استخرت الله تعالى فيه وسميته كتاب تعليم المتعلم طريق التعلم وجعلته فصولا"; 

        // رابط جوجل شيت الخاص بك (تأكد من وضعه هنا لضمان وصول الدرجات)
        const scriptURL = "ضع_رابط_جوجل_شيت_هنا";

        function normalize(t) { return t.trim().replace(/\s+/g, ' '); }

        // التنبيه الفوري بالأخطاء أثناء الكتابة
        const studentInput = document.getElementById('studentInput');
        studentInput.addEventListener('input', function() {
            const feedback = document.getElementById('liveFeedback');
            const val = this.value;
            if (normalize(correctText).startsWith(normalize(val))) {
                feedback.innerHTML = '<span class="success-text">قراءة صحيحة، تابع.. ✅</span>';
                this.style.borderColor = "#a1cba1";
            } else {
                feedback.innerHTML = '<span class="error-text">هناك خطأ في الكلمة الأخيرة! ❌</span>';
                this.style.borderColor = "#e5a1a1";
            }
        });

        // ميزة التكبير (الزوم) التفاعلي - تم تحسينها
        const img = document.getElementById('displayImg');
        const container = document.getElementById('img-zoom-container');
        
        container.addEventListener('mousemove', function(e) {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
