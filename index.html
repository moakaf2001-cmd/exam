<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر المخطوطات - الأستاذ هاشم</title>
    <style>
        body { font-family: 'Amiri', serif; background-color: #fcfbf7; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #3e2723; }
        .main-wrapper { display: flex; width: 95%; max-width: 1200px; gap: 25px; align-items: flex-start; }
        .section { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); position: relative; }
        .student-info { display: flex; gap: 15px; margin-bottom: 15px; background: #fdfae3; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; border: 1px solid #eee; }
        .student-info input { flex: 1; padding: 10px; border: 1px solid #d7ccc8; border-radius: 5px; font-family: 'Amiri'; font-size: 1.1rem; }
        .img-container { position: relative; overflow: hidden; border: 2px solid #5d4037; border-radius: 8px; cursor: zoom-in; background: #000; height: 500px; display: flex; align-items: center; }
        #displayImg { width: 100%; display: block; transition: transform 0.1s ease-out; transform-origin: center center; }
        textarea#studentInput { width: 100%; height: 300px; font-size: 1.5rem; line-height: 2.2rem; padding: 15px; border: 2px solid #d7ccc8; border-radius: 8px; resize: none; box-sizing: border-box; font-family: 'Amiri', serif; }
        #liveFeedback { font-weight: bold; font-size: 1.2rem; text-align: center; margin-top: 15px; min-height: 1.5rem; }
        button { background-color: #5d4037; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-family: 'Amiri'; margin-top: 15px; width: 100%; }
        .result-box { background: #fdfae3; border: 2px solid #fff9c4; padding: 20px; border-radius: 12px; margin-top: 25px; text-align: right; width: 100%; box-sizing: border-box; display: none; }
        .word-correct { color: #2e7d32; font-weight: bold; }
        .word-wrong { color: #c62828; text-decoration: line-through; }
        .word-original { color: #5d4037; font-weight: bold; background: #fff9c4; padding: 0 4px; border-radius: 3px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

    <h2 style="color: #5d4037;">مختبر قراءة المخطوطات العربيّة</h2>
    
    <div class="student-info">
        <input type="text" id="studentName" placeholder="اسم الطالب بالكامل">
        <input type="text" id="studentID" placeholder="الرقم الجامعي">
    </div>

    <div class="main-wrapper">
        <div class="section" style="flex: 1.3;">
            <div class="img-container" id="img-zoom-container">
                <img id="displayImg" src="image.jpg" alt="المخطوط">
            </div>
            <p style="text-align: center; color: #8d6e63; font-size: 0.9rem; margin-top: 10px;">* حرك الفأرة فوق الصورة للتكبير.</p>
        </div>
        
        <div class="section">
            <textarea id="studentInput" placeholder="ابدأ بالنسخ الحرفي هنا..."></textarea>
            <div id="liveFeedback"></div>
            <button id="finishBtn" onclick="showResults()">إنهاء الاختبار وعرض النتيجة</button>

            <div class="result-box" id="resultBox">
                <h3>النتيجة والتصحيح النهائي:</h3>
                <div id="studentDataDisplay" style="margin-bottom: 10px; font-size: 1.2rem;"></div>
                <p style="font-size: 1.4rem; font-weight: bold;">نسبة الإتقان: <span id="accuracyPercent"></span></p>
                <div id="comparisonArea" style="line-height: 2.5rem; font-size: 1.3rem;"></div>
                <button onclick="location.reload()" style="background:#8d6e63; width: auto; margin-top: 15px;">إعادة الاختبار</button>
            </div>
        </div>
    </div>

    <script>
        const correctText = "بسم الله الرحمن الرحيم رب يسر يا كريم الحمد لله الذي فضل بني آدم بالعلم والعمل على جميع العالم والصلاة والسلام على محمد سيد العرب والعجم وعلى آله وأصحابه ينابيع العلوم والحكم وبعد فلما رأيت كثيرا من طلاب العلم في زماننا يجدون إلى العلم ولا يصلون ومن منافعه وثمراته وهي العمل به والنشر يحرمون لما أنهم أخطأوا طريقه وتركوا شرائطه وكل من أخطأ الطريق ضل ولا ينال المقصود قل أو جل فأردت وأحببت أن أبين لهم طريق التعلم على ما رأيت في الكتب وسمعت من أساتيذي أولي العلم والحكم رجاء للدعاء لي من الراغبين فيه المخلصين بالفوز والخلاص في يوم الدين بعدما استخرت الله تعالى فيه وسميته كتاب تعليم المتعلم طريق التعلم وجعلته فصولا"; 

        const scriptURL = "ضع_رابط_جوجل_شيت_هنا";

        function normalize(t) { return t.trim().replace(/\s+/g, ' '); }

        // التنبيه الفوري بالأخطاء (يعمل الآن!)
        const studentInput = document.getElementById('studentInput');
        studentInput.addEventListener('input', function() {
            const feedback = document.getElementById('liveFeedback');
            const val = this.value;
            if (normalize(correctText).startsWith(normalize(val))) {
                feedback.innerHTML = '<span style="color: green">قراءة صحيحة، تابع.. ✅</span>';
                this.style.borderColor = "#a1cba1";
            } else {
                feedback.innerHTML = '<span style="color: red">خطأ في الكلمة الأخيرة! ❌</span>';
                this.style.borderColor = "#e5a1a1";
            }
        });

        // ميزة التكبير (الزوم) بالتحريك
        const img = document.getElementById('displayImg');
        const container = document.getElementById('img-zoom-container');
        container.onmousemove = (e) => {
            const rect = container.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            img.style.transformOrigin = `${x}% ${y}%`;
            img.style.transform = "scale(2.5)";
        };
        container.onmouseleave = () => img.style.transform = "scale(1)";

        function showResults() {
            const name = document.getElementById('studentName').value.trim();
            const id = document.getElementById('studentID').value.trim();
            if(!name || !id) return alert("يرجى إدخال الاسم والرقم الجامعي!");

            const userText = studentInput.value;
            const origWords = normalize(correctText).split(' ');
            const userWords = normalize(userText).split(' ');
            let correct = 0;
            let html = '';

            for (let i = 0; i < origWords.length; i++) {
                if (origWords[i] === userWords[i]) {
                    html += `<span class="word-correct">${origWords[i]}</span> `;
                    correct++;
                } else {
                    html += `<span class="word-wrong">${userWords[i] || "___"}</span> <span class="word-original">[الأصل: ${origWords[i]}]</span> `;
                }
            }

            const score = ((correct / origWords.length) * 100).toFixed(1) + "%";
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name, id, score}) });

            document.getElementById('studentDataDisplay').innerHTML = `الطالب: ${name} | الرقم: ${id}`;
            document.getElementById('accuracyPercent').innerText = score;
            document.getElementById('comparisonArea').innerHTML = html;
            document.getElementById('resultBox').style.display = 'block';
            studentInput.disabled = true;
            document.getElementById('finishBtn').style.display = 'none';
        }
    </script>
</body>
</html>
